const OVERVIEW = {
  type: "front",
  title: "Using This Guide",
  eyebrow: "Front Matter",
  body: `
    <p class="lede">This companion accompanies the <em>SIEM Correlation Practice</em> module — a ten-scenario interactive exercise in which students review streams of raw log telemetry and identify which events correlate into a coherent attack chain. The student-facing module is self-contained and self-grading; this guide exists to help you turn that practice into structured instruction.</p>

    <h2 class="section">What the exercise teaches</h2>
    <p>The mechanical skill is straightforward — clicking the right log lines. The cognitive skill underneath it is what we actually care about: <strong>pivoting on shared indicators</strong> (identity, host, IP, timestamp, process lineage) to assemble a narrative from disconnected events, while resisting the urge to flag everything that looks unusual in isolation.</p>

    <p>This is the bread-and-butter activity of Tier 1 SOC work. Most real alerts are noise. The analyst's job is to recognize which noise hangs together and which is unrelated. Students who learn to correlate well develop two habits at once: <strong>healthy skepticism toward isolated alerts</strong>, and <strong>structured curiosity about timestamps and shared fields</strong>.</p>

    <h2 class="section">How to use this guide</h2>
    <p>Each scenario in the guide has the same structure:</p>
    <ul>
      <li><strong>Learning objectives</strong> — what students should be able to do after working the scenario.</li>
      <li><strong>The attack chain</strong> — the events you're asking students to find, with the analytical pivots that connect them.</li>
      <li><strong>Why the noise is there</strong> — the deliberate distractors and what makes each one tempting.</li>
      <li><strong>Common student mistakes</strong> — what new analysts typically get wrong, and the conceptual fix.</li>
      <li><strong>Discussion prompts</strong> — questions for full-class or small-group debrief.</li>
      <li><strong>Pacing &amp; assessment notes</strong> — time estimates, scoring guidance, and ways to extend.</li>
    </ul>

    <h2 class="section">Suggested course placement</h2>
    <p>This module fits well after students have been introduced to log sources (firewall, EDR, identity, email gateway), the basics of the Cyber Kill Chain or MITRE ATT&amp;CK framework, and the concept of indicators of compromise. It does not require hands-on SIEM tool experience — the abstraction of "click the malicious events" lets students focus on correlation logic without getting lost in Splunk SPL or Elastic queries.</p>

    <p>I recommend assigning the four <em>Beginner</em> and <em>Intermediate</em> scenarios first as graded homework, then using one or two <em>Advanced</em> scenarios as in-class group work where you can listen to students reason aloud. The Advanced scenarios reward discussion in ways that solo work does not.</p>

    <div class="callout">
      <div class="label">A note on the scoring</div>
      <p>The student module scores +10 per correctly identified malicious event and −5 per false positive, with a floor at zero. This deliberately punishes over-flagging more than under-flagging — because in real life, an analyst who flags everything is just generating new noise. If your assessment philosophy differs, you can choose to weight the scenarios manually using your own rubric (see Appendix A).</p>
    </div>

    <h2 class="section">Difficulty progression</h2>
    <p>The scenarios are loosely ordered by difficulty, but the difficulty chips on each one are more reliable than the numeric sequence. The Advanced scenarios (4, 5, 6, 7, 9) require students to recognize specific tradecraft — Cobalt Strike beacons, Kerberoasting, DNS tunneling, supply chain compromise, LOLBin chains — that you may want to seed with a brief mini-lecture before assigning.</p>
  `
};

const SCENARIOS = [
  // ──────────────────────────────────────────────────────────
  // 1. After-Hours O365
  // ──────────────────────────────────────────────────────────
  {
    title: "After-Hours Office 365 Compromise",
    difficulty: 1,
    estMinutes: 8,
    body: `
      <p class="lede">A finance user logs in from a Tor exit node at 2 AM, runs base64-encoded PowerShell on their workstation, and a few minutes later 18 megabytes leave that workstation heading back to the same Tor IP. This is the warmup scenario — and it's worth slowing down on, because every analytical pattern students will need for the rest of the module appears here in its simplest form.</p>

      <h2 class="section">Learning objectives</h2>
      <p>After completing this scenario, students should be able to:</p>
      <ul>
        <li>Identify a shared IP address as a pivot connecting authentication events to network traffic events.</li>
        <li>Recognize <strong>failed-then-successful authentication</strong> from the same source within seconds as a brute-force / password-spray signature.</li>
        <li>Explain why <strong>base64-encoded PowerShell</strong> is suspicious in itself, regardless of what the encoded content does.</li>
        <li>Distinguish routine operational telemetry (DNS-over-HTTPS, scheduled backups, marketing email) from telemetry that points to an actor.</li>
      </ul>

      <h2 class="section">The attack chain</h2>
      <p>Four events form the chain, and all four share the IP <code>185.220.101.45</code> either as source or destination. That IP is the pivot. Once a student finds it in two events, the others become obvious.</p>

      <table class="killchain">
        <thead><tr><th>Stage</th><th>Event</th><th>Pivot</th></tr></thead>
        <tbody>
          <tr><td class="stage">Credential Access</td><td>14 failed O365 logins for <code>j.morgan</code> from Tor exit node</td><td>IP, user</td></tr>
          <tr><td class="stage">Credential Access</td><td>Successful login from same IP after 33 seconds</td><td>IP, user, timing</td></tr>
          <tr><td class="stage">Execution</td><td>Base64-encoded PowerShell on HOST-FIN-08 under <code>j.morgan</code></td><td>User, host</td></tr>
          <tr><td class="stage">Exfiltration</td><td>18 MB encrypted outbound from HOST-FIN-08 to the same Tor IP</td><td>IP, host</td></tr>
        </tbody>
      </table>

      <h3 class="subsection">Why the noise is there</h3>
      <p>The DNS-over-HTTPS firewall allow is included because some students will see "encrypted DNS to a non-corporate resolver" and assume it must be exfiltration. The marketing newsletter is there because the timing (02:15:10) overlaps the chain — students need to learn that <em>temporal proximity is not correlation</em>. The nightly backup completing at 02:15:47 is the densest distractor; 412 GB is a big number, and students who anchor on data volume will flag it. The lobby printer DHCP renewal is a freebie — once they've worked it through, students laugh at having even considered it.</p>

      <div class="misconception">
        <div class="heading">Common mistake</div>
        <p>Students flag the marketing newsletter because "12,400 recipients" looks suspicious. Reframe: <em>volume alone is not anomaly</em>. The newsletter is sent via SendGrid (a sanctioned service) to recipients (presumably customers) at a time consistent with marketing automation. Without an actor or affected asset on the inside, there is no chain.</p>
      </div>

      <div class="misconception">
        <div class="heading">Common mistake</div>
        <p>Students flag <em>k.patel's</em> VPN connection because it falls inside the attack window. The connection is from the corporate office IP at a normal location — the only thing it shares with the chain is timestamp. Use this to introduce the rule: <strong>shared time without a shared pivot field is not correlation.</strong></p>
      </div>

      <h2 class="section">Discussion prompts</h2>

// ============================================================
// STATE & RENDERING
// ============================================================
const STORAGE_KEY = "siem-instructor-guide-v1";
let currentSection = "overview"; // 'overview' | 'rubric' | 'mapping' | scenario index as string

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const s = JSON.parse(raw);
      if (s.section) currentSection = s.section;
    }
  } catch (e) { /* ignore */ }
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ section: currentSection }));
  } catch (e) { /* ignore */ }
}

// ============================================================
// SIDEBAR
// ============================================================
function renderSidebar() {
  // Scenarios list
  const list = document.getElementById("scenarioNav");
  list.innerHTML = "";
  SCENARIOS.forEach((sc, i) => {
    const li = document.createElement("li");
    const btn = document.createElement("button");
    btn.type = "button";
    btn.setAttribute("role", "tab");
    btn.dataset.section = String(i);
    btn.setAttribute("aria-selected", currentSection === String(i) ? "true" : "false");
    if (currentSection === String(i)) btn.classList.add("active");

    const num = document.createElement("span");
    num.className = "num";
    num.textContent = String(i + 1).padStart(2, "0");
    btn.appendChild(num);

    const lbl = document.createElement("span");
    lbl.textContent = sc.title;
    btn.appendChild(lbl);

    li.appendChild(btn);
    list.appendChild(li);
  });

  // Front and back matter
  document.querySelectorAll(".sidebar-nav button[data-section]").forEach(btn => {
    const sec = btn.dataset.section;
    btn.classList.toggle("active", currentSection === sec);
    btn.setAttribute("aria-selected", currentSection === sec ? "true" : "false");
    btn.addEventListener("click", () => navigateTo(sec));
  });
}

function navigateTo(section) {
  currentSection = section;
  saveState();
  renderSidebar();
  renderArticle();
  // Scroll to top of content
  document.querySelector(".content").scrollTo({ top: 0, behavior: "smooth" });
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// ============================================================
// ARTICLE
// ============================================================
function renderArticle() {
  const article = document.getElementById("article");
  let data;
  let eyebrow = "";
  let chips = "";

  if (currentSection === "overview") {
    data = OVERVIEW;
    eyebrow = data.eyebrow;
  } else if (currentSection === "rubric") {
    data = RUBRIC;
    eyebrow = data.eyebrow;
  } else if (currentSection === "mapping") {
    data = MAPPING;
    eyebrow = data.eyebrow;
  } else {
    const idx = parseInt(currentSection, 10);
    if (isNaN(idx) || !SCENARIOS[idx]) {
      currentSection = "overview";
      return renderArticle();
    }
    const sc = SCENARIOS[idx];
    const diffLabel = ["", "Beginner", "Intermediate", "Advanced"][sc.difficulty];
    data = { title: sc.title, body: sc.body };
    eyebrow = `Scenario ${idx + 1} of ${SCENARIOS.length}`;
    chips = `
      <span class="chip diff-${sc.difficulty}">${diffLabel}</span>
      <span class="chip">~${sc.estMinutes} minutes</span>
    `;
  }

  article.innerHTML = `
    <div class="toolbar">
      <button type="button" id="printBtn" aria-label="Print this section">Print this section</button>
      ${currentSection !== "overview" && currentSection !== "rubric" && currentSection !== "mapping" ? `
        <button type="button" id="prevBtn" aria-label="Previous scenario">← Previous</button>
        <button type="button" id="nextBtn" aria-label="Next scenario">Next →</button>
      ` : ""}
    </div>
    <header class="article-header">
      <div class="eyebrow">${eyebrow}</div>
      <h1>${data.title}</h1>
      ${chips ? `<div class="meta">${chips}</div>` : ""}
    </header>
    ${data.body}
    <footer class="guide-footer">
      <p>Instructor Guide · <span class="program">Networking &amp; Cybersecurity</span> · Brookdale Community College · 2026</p>
    </footer>
  `;

  // Wire buttons
  const printBtn = document.getElementById("printBtn");
  if (printBtn) printBtn.addEventListener("click", () => window.print());

  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");
  if (prevBtn) {
    const idx = parseInt(currentSection, 10);
    prevBtn.disabled = idx === 0;
    prevBtn.addEventListener("click", () => navigateTo(String(idx - 1)));
  }
  if (nextBtn) {
    const idx = parseInt(currentSection, 10);
    nextBtn.disabled = idx === SCENARIOS.length - 1;
    nextBtn.addEventListener("click", () => navigateTo(String(idx + 1)));
  }
}

// ============================================================
// INIT
// ============================================================
loadState();
renderSidebar();
renderArticle();
</script>
</body>
</html>
